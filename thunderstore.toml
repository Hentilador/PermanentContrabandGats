[config]
schemaVersion = "0.0.1"

[package]
namespace = "Hentilador"
name = "PermanentContrabandGats"
description = "Disables resetting of Contraband Gats"
versionNumber = "1.0.0"
websiteUrl = "https://github.com/Hentilador/PermanentContrabandGats"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/netstandard2.1/PermanentContrabandGats.dll"
target = "BepInEx/plugins/PermanentContrabandGats.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]


